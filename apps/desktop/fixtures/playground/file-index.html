<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
	</head>
	<body class="m-0 min-h-dvh overflow-auto bg-background font-sans text-foreground">
		<main
			class="mx-auto grid min-h-dvh max-w-5xl content-start gap-5 p-6"
			x-data="{
				files: [],
				sort: 'recent',
				error: '',
				async init() {
					try {
						this.files = await hubble.files.list('**/*.md')
					} catch (error) {
						this.error = error.message
					}
				},
				get sortedFiles() {
					return [...this.files].sort((a, b) => {
						if (this.sort === 'name') {
							return a.path.toLowerCase().localeCompare(b.path.toLowerCase())
						}
						return b.modified_at - a.modified_at || a.path.localeCompare(b.path)
					})
				},
				date(timestamp) {
					return new Date(timestamp * 1000).toLocaleString()
				}
			}"
		>
			<div class="flex items-center justify-between gap-3 border-b border-border pb-4">
				<h1 class="m-0 text-2xl leading-tight font-bold">Workspace files</h1>
				<div class="flex gap-2" aria-label="Sort files">
					<button
						class="cursor-pointer rounded-md border border-border bg-card p-2 text-foreground aria-pressed:border-primary aria-pressed:bg-primary aria-pressed:text-primary-foreground"
						type="button"
						:aria-pressed="sort === 'recent'"
						@click="sort = 'recent'"
					>
						Recent
					</button>
					<button
						class="cursor-pointer rounded-md border border-border bg-card p-2 text-foreground aria-pressed:border-primary aria-pressed:bg-primary aria-pressed:text-primary-foreground"
						type="button"
						:aria-pressed="sort === 'name'"
						@click="sort = 'name'"
					>
						Name
					</button>
				</div>
			</div>

			<p class="m-0 text-muted-foreground" x-show="!error && files.length === 0">
				Loading files...
			</p>
			<p class="m-0 text-muted-foreground" x-show="error" x-text="error"></p>

			<ul class="m-0 grid list-none gap-2 p-0" x-show="!error && files.length > 0">
				<template x-for="file in sortedFiles" :key="file.path">
					<li class="grid gap-1 border-b border-border p-3">
						<span class="text-[15px] font-bold" x-text="file.path"></span>
						<span
							class="text-[13px] text-muted-foreground"
							x-text="`${date(file.modified_at)} · ${file.size} bytes`"
						></span>
					</li>
				</template>
			</ul>
		</main>
	</body>
</html>
